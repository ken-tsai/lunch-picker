const restaurants=DATA.map(r=>({...r,distance:dist(r.lat,r.lng)}));
let filters={cuisine:'all',price:'all',dist:'all',rating:'all'};
function setFilter(type,value,btn){filters[type]=value;document.querySelectorAll('[data-filter="'+type+'"]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards()}
function matches(r){if(filters.cuisine!=='all'&&r.c!==filters.cuisine)return false;if(filters.price!=='all'){if(filters.price==='0'){if(r.p!==0&&r.p!==null)return false}else{if(r.p!==parseInt(filters.price))return false}}if(filters.dist!=='all'&&r.distance>parseInt(filters.dist))return false;if(filters.rating!=='all'&&r.r<parseFloat(filters.rating))return false;return true}
function renderCards(){
  const grid=document.getElementById('grid');
  grid.querySelectorAll('.card').forEach(c=>c.remove());
  const vis=restaurants.filter(matches).sort((a,b)=>b.r-a.r);
  document.getElementById('visibleCount').textContent=vis.length;
  document.getElementById('totalCount').textContent=vis.length;
  document.getElementById('emptyState').style.display=vis.length===0?'block':'none';
  const emp=document.getElementById('emptyState');
  vis.forEach(r=>{
    const pi=priceInfo(r.p),op=isOpen(r.w),h=todayH(r.w);
    const dc=r.distance<=300?'#4caf7d':r.distance<=500?'#f5a623':'#8a8580';
    const card=document.createElement('div');
    card.className='card';card.onclick=()=>openCard(r);
    card.innerHTML=`<div class="card-header"><div class="card-name">${r.name}</div><div class="rating-badge"><span class="rating-number">${r.r}</span><span class="rating-count">${r.rc.toLocaleString()}評</span></div></div><div class="card-tags"><span class="tag tag-cuisine">${r.c}</span><span class="tag ${pi.cls}">${pi.text}</span><span class="distance-tag" style="color:${dc}">📍${r.distance}m</span>${op!==null?`<span class="tag" style="background:rgba(${op?'76,175,125':'224,82,82'},.1);color:${op?'#4caf7d':'#e05252'};border:1px solid rgba(${op?'76,175,125':'224,82,82'},.2)"><span class="open-dot ${op?'open':'closed'}"></span>${op?'營業中':'未開'}</span>`:''}</div>${h?`<div class="card-hours">🕐 今日：${h}</div>`:''}<div class="card-review">${r.rev}</div><a class="gmaps-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' '+r.addr)}" target="_blank" onclick="event.stopPropagation()">🗺 Google Maps</a>`;
    grid.insertBefore(card,emp);
  });
}
function openCard(r,isRandom=false){
  const pi=priceInfo(r.p),op=isOpen(r.w),h=todayH(r.w);
  document.getElementById('modalEyebrow').textContent=isRandom?'🎲 今天就吃這間！':'🍜 餐廳資訊';
  document.getElementById('modalName').textContent=r.name;
  document.getElementById('modalDetails').innerHTML=`<div class="modal-row"><span class="modal-row-label">類型</span>${r.c}</div><div class="modal-row"><span class="modal-row-label">評分</span>⭐ ${r.r} · ${r.rc.toLocaleString()} 則評論</div><div class="modal-row"><span class="modal-row-label">價位</span>${pi.text}</div><div class="modal-row"><span class="modal-row-label">距離</span>直線約 ${r.distance}m</div><div class="modal-row"><span class="modal-row-label">今日</span>${h||'未知'} ${op!==null?(op?'✅ 營業中':'❌ 目前未開'):''}</div><div class="modal-row"><span class="modal-row-label">地址</span>${r.addr}</div>`;
  document.getElementById('modalReview').textContent=`"${r.rev}"`;
  document.getElementById('modalMapsBtn').onclick=()=>window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(r.name+' '+r.addr),'_blank');
  document.getElementById('modalOverlay').classList.add('show');
}
function pickRandom(){const vis=restaurants.filter(matches);if(!vis.length){alert('目前沒有符合條件的餐廳！');return}openCard(vis[Math.floor(Math.random()*vis.length)],true)}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalBtn()}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalBtn()});
renderCards();
</script>
